<!DOCTYPE html>
<html>
<head>
  <title>Neon Loading</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Neon Interface">
  <meta property="og:description" content="Loading experience...">
  <meta property="og:image" content="https://i.imgur.com/RB0zVxo.jpeg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #05070f;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    /* neon glow background */
    .bg {
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 30%, #00f5ff33, transparent 40%),
                  radial-gradient(circle at 80% 70%, #ff00ff33, transparent 45%),
                  radial-gradient(circle at 50% 50%, #7a5cff22, transparent 50%);
      filter: blur(60px);
      animation: move 12s infinite alternate;
    }

    @keyframes move {
      0% { transform: translate(-5%, -5%); }
      100% { transform: translate(5%, 5%); }
    }

    /* card */
    .card {
      width: 340px;
      padding: 30px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,255,0.2);
      backdrop-filter: blur(18px);
      text-align: center;
      box-shadow: 0 0 40px rgba(0,255,255,0.08);
      z-index: 2;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 15px;
      border-radius: 16px;
      background: url('https://i.imgur.com/RB0zVxo.jpeg') center/cover;
      box-shadow: 0 0 20px #00f5ff55;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 6px;
      text-shadow: 0 0 10px #00f5ff66;
    }

    p {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .status {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 15px;
      color: #00f5ff;
      text-shadow: 0 0 8px #00f5ff55;
    }

    .bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00f5ff, #ff00ff);
      box-shadow: 0 0 10px #00f5ff;
      transition: width 0.2s;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #00f5ff55;
      background: transparent;
      color: #00f5ff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 10px #00f5ff22;
    }

    button:hover {
      background: rgba(0,245,255,0.1);
      transform: translateY(-2px);
      box-shadow: 0 0 20px #00f5ff33;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">
  <div class="logo"></div>

  <h1>Neon Interface</h1>
  <p>Initializing system module</p>

  <div class="status" id="status">Booting...</div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <button onclick="go()">Enter</button>
</div>

<script>
  const link = "https://fdeddg.hubss.one/p/nhVNy";

  function go() {
    window.location.href = link;
  }

  let progress = 0;
  const fill = document.getElementById("fill");

  setInterval(() => {
    if (progress < 100) {
      progress += Math.random() * 5;
      if (progress > 100) progress = 100;
      fill.style.width = progress + "%";
    }
  }, 200);

  const texts = [
    "Syncing modules...",
    "Loading assets...",
    "System ready..."
  ];

  let i = 0;
  setInterval(() => {
    document.getElementById("status").innerText = texts[i];
    i = (i + 1) % texts.length;
  }, 1500);
</script>

</body>
</html>
