<!DOCTYPE html>
<html>
<head>
  <title>Love Interface</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ================= OG PREVIEW (EDIT HERE) ================= -->
  <meta property="og:title" content="Love Interface • Tap To Enter">
  <meta property="og:description" content="A premium visual experience 💦">
  <meta property="og:image" content="https://i.imgur.com/RB0zVxo.jpeg">
  <!-- ========================================================== -->

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #07040f;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    /* ===== NEON LOVE BACKGROUND ===== */
    .bg {
      position: fixed;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle at 20% 30%, #ff4fd833, transparent 40%),
        radial-gradient(circle at 80% 70%, #7a5cff33, transparent 45%),
        radial-gradient(circle at 50% 50%, #ff7ac633, transparent 50%);
      filter: blur(60px);
      animation: move 10s infinite alternate;
      z-index: 0;
    }

    @keyframes move {
      0% { transform: translate(-5%, -5%); }
      100% { transform: translate(5%, 5%); }
    }

    /* ===== HEART PARTICLES CANVAS ===== */
    #heartCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ===== CARD ===== */
    .card {
      width: 340px;
      padding: 30px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255, 105, 180, 0.25);
      backdrop-filter: blur(18px);
      text-align: center;
      box-shadow: 0 0 40px rgba(255, 105, 180, 0.08);
      z-index: 2;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 15px;
      border-radius: 16px;
      background: url('https://i.imgur.com/RB0zVxo.jpeg') center/cover;
      box-shadow: 0 0 20px #ff4fd855;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 6px;
      text-shadow: 0 0 10px #ff4fd866;
    }

    p {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .status {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 15px;
      color: #ff7ac6;
    }

    .bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4fd8, #7a5cff);
      transition: width 0.15s;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #ff4fd855;
      background: transparent;
      color: #ff7ac6;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: rgba(255,79,216,0.1);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

<div class="bg"></div>

<canvas id="heartCanvas"></canvas>

<div class="card">
  <div class="logo"></div>

  <h1>Love Interface</h1>
  <p>Premium neon visual experience</p>

  <div class="status" id="status">Booting...</div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <button onclick="go()">Enter</button>
</div>

<script>

  /* ================= SMARTLINK (EDIT HERE) ================= */
  const link = "https://fdeddg.hubss.one/p/nhVNy";
  /* ======================================================== */

  function go() {
    window.location.href = link;
  }

  // ===== FAST LOADING =====
  let progress = 0;
  const fill = document.getElementById("fill");

  setInterval(() => {
    if (progress < 100) {
      progress += Math.random() * 10;
      if (progress > 100) progress = 100;
      fill.style.width = progress + "%";
    }
  }, 120);

  const texts = [
    "Syncing love modules...",
    "Loading visuals...",
    "Ready..."
  ];

  let i = 0;
  setInterval(() => {
    document.getElementById("status").innerText = texts[i];
    i = (i + 1) % texts.length;
  }, 900);

  // ===== HEART PARTICLES =====
  const canvas = document.getElementById("heartCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const hearts = [];

  function createHeart() {
    return {
      x: Math.random() * canvas.width,
      y: canvas.height + 20,
      size: Math.random() * 10 + 6,
      speed: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.5 + 0.3,
      drift: Math.random() * 1 - 0.5
    };
  }

  setInterval(() => {
    if (hearts.length < 25) {
      hearts.push(createHeart());
    }
  }, 200);

  function drawHeart(x, y, size, alpha) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#ff4fd8";

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.bezierCurveTo(x, y - size/2, x - size, y - size/2, x - size, y);
    ctx.bezierCurveTo(x - size, y + size/2, x, y + size, x, y + size*1.2);
    ctx.bezierCurveTo(x, y + size, x + size, y + size/2, x + size, y);
    ctx.bezierCurveTo(x + size, y - size/2, x, y - size/2, x, y);
    ctx.fill();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < hearts.length; i++) {
      let h = hearts[i];
      h.y -= h.speed;
      h.x += h.drift;

      drawHeart(h.x, h.y, h.size, h.alpha);

      if (h.y < -20) {
        hearts[i] = createHeart();
      }
    }

    requestAnimationFrame(animate);
  }

  animate();

</script>

</body>
</html>
